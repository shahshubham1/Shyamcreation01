<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shyam Creation | Fashion Store</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="logo">Shyam Creation</div>
</header>

<section class="hero">
  <div>
    <h1>Shyam Creation</h1>
    <p>Elegant Sarees, Kurtis & Western Wear</p>
  </div>
</section>

<section class="section">

  <input type="text" id="searchInput" placeholder="Search products...">

  <div class="filters">
    <button class="filter-btn">All</button>
    <button class="filter-btn">Saree</button>
    <button class="filter-btn">Kurti</button>
    <button class="filter-btn">Anarkali</button>
    <button class="filter-btn">Western</button>
  </div>

  <p>Total Products: <span id="productCount">0</span></p>

  <div class="products" id="product-container"></div>

</section>

<script src="js/app.js"></script>

</body>
</html>
